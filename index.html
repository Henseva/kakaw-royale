      const payload=JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:600,messages:[{role:'system',content:getChefSystem(msgs,q)},...history,{role:'user',content:q}]});
      for(let attempt=0;attempt<3;attempt++){
        try{
          res=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:payload});
          break;
        }catch(err){
          lastErr=err;
          if(attempt<2)await new Promise(r=>setTimeout(r,1000*(attempt+1)));
        }
      }
      if(!res)throw lastErr||new Error('Failed after 3 attempts');
      const data=await res.json();
      if(!res.ok){
        const apiErr=data?.error?.message||('Erro '+res.status);
        throw new Error(String(res.status)+' '+apiErr);
      }
      const reply=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'Pardonnez-moi — resposta vazia. Pode repetir?';
      setMsgs(m=>[...m,{role:'ai',text:reply,time:new Date(),liked:false}]);
      // Parse cards from reply
      const parsedReply=parseChefMsg(reply);
      const replyCards=parsedReply.cards||[];
      // Log conversation
      const logs=LS.get('sab_chef_logs',[]);
      const session=LS.get('sab_chef_session',{id:Date.now(),start:new Date().toISOString(),msgs:[]});
      session.msgs.push({q,a:reply.slice(0,200),t:new Date().toISOString(),dish:replyCards[0]||null});
      // ── Memory Learning ──
      const mem=LS.get('sab_chef_memory',{});
      let memChanged=false;
      // Name detection
      const nameMatcher=q.match(/(?:me chamo|meu nome é|sou o|sou a)\s+([A-ZÀ-Ú][a-zà-ú]+)/i);
      if(nameMatcher){mem.name=nameMatcher[1];memChanged=true;}
      // Dish preferences from cards
      if(replyCards.length>0){mem.dishes=(mem.dishes?mem.dishes+', ':'')+replyCards[0];mem.lastOrder=replyCards[0];memChanged=true;}
      // Dislikes detection
      const dislikeMatcher=q.match(/(?:não gosto|detesto|odeio|alérgico|sem|não quero)\s+(?:de\s+)?([a-zà-ú]+)/i);
      if(dislikeMatcher){mem.dislikes=(mem.dislikes?mem.dislikes+', ':'')+dislikeMatcher[1];memChanged=true;}
      // Occasion detection
      const occasionMap=[['aniversário','Aniversário 🎂'],['casamento','Casamento 💍'],['namorado','Jantar romântico 💑'],['namorada','Jantar romântico 💑'],['formatura','Formatura 🎓'],['pedido de namoro','Pedido especial 💝'],['noivado','Noivado 💍']];
      for(const[kw,label]of occasionMap){if(q.toLowerCase().includes(kw)){mem.occasion=label;memChanged=true;break;}}
      if(memChanged)LS.set('sab_chef_memory',mem);
      LS.set('sab_chef_session',session);
      if(!logs.find(l=>l.id===session.id))logs.unshift(session);
      else{const i=logs.findIndex(l=>l.id===session.id);logs[i]=session;}
      LS.set('sab_chef_logs',logs.slice(0,50));// keep last 50 sessions
      // Save full history for Chef context (last 3 sessions, last 5 msgs each)
      const fullHistory=LS.get('sab_chef_full_history',[]);
      const sessionSummary={date:new Date().toISOString(),msgs:session.msgs.slice(-5)};
      LS.set('sab_chef_full_history',[sessionSummary,...fullHistory].slice(0,3));
    }catch(e){
      let errMsg;
      if(!navigator.onLine){
        errMsg=getOfflineReply();
      } else if(e&&e.message&&e.message.includes('401')){
        errMsg='🔑 Problema de autenticação no servidor. Tente novamente em instantes.';
      } else if(e&&e.message&&e.message.includes('429')){
        errMsg='⏳ Muitas requisições simultâneas. Aguarde um momento e tente novamente.';
      } else if(e&&e.message&&e.message.includes('503')){
        errMsg='🔧 Serviço momentaneamente sobrecarregado. Tentando novamente em instantes...';
      } else {
        errMsg='Pardonnez-moi — problema de conexão após 3 tentativas. Verifique sua internet e tente novamente.';
      }
      setMsgs(m=>[...m,{role:'ai',text:errMsg,time:new Date(),liked:false}]);
      console.error('Chef API error:',e?.message||'unknown');
    }
    setLoading(false);
    setTimeout(()=>inputRef.current&&inputRef.current.focus(),80);
  };

  const handleKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};

  // Proactive suggestion after 30s inactivity
  const proactiveTimer=useRef(null);
  const proactiveSent=useRef(false);
  useEffect(()=>{
    if(!open||proactiveSent.current)return;
    proactiveTimer.current=setTimeout(()=>{
      if(!loading&&proactiveSent.current===false){
        proactiveSent.current=true;
        const proactiveMsgs=[
          'Posso sugerir algo especial para hoje? Temos opções incríveis para cada paladar 🍽',
          'Está com dificuldade de escolher? Me conte o que você está com vontade — doce, salgado, leve ou sofisticado 🎭',
          'Permitam-me uma sugestão: nosso prato do dia está recebendo críticas excepcionais. Quer saber qual é? ✨',
        ];
        const txt=proactiveMsgs[Math.floor(Math.random()*proactiveMsgs.length)];
        setMsgs(m=>[...m,{role:'ai',text:txt,time:new Date(),liked:false}]);
      }
    },30000);
    return()=>clearTimeout(proactiveTimer.current);
  },[open]);
  const resetProactive=()=>{clearTimeout(proactiveTimer.current);};

  // Detectar indecisão — 3+ trocas de assunto sem clicar em prato
  const indecisionRef=useRef(false);
  useEffect(()=>{
    if(!open||indecisionRef.current)return;
    const userMsgs=msgs.filter(m=>m.role==='user');
    if(userMsgs.length<3)return;
    // Topics: food type keywords
    const topicWords=[['japonês','sushi','temaki','salmão'],['pizza','italiana','massa','macarrão'],['carne','filé','hambúrguer','churrasco'],['leve','salada','light','vegano'],['doce','sobremesa','chocolate'],['mexicano','tacos','burrito'],['árabe','esfiha','kibe']];
    const recentMsgs=userMsgs.slice(-4).map(m=>m.text.toLowerCase());
    const topicsFound=new Set();
    recentMsgs.forEach(txt=>topicWords.forEach((words,i)=>{if(words.some(w=>txt.includes(w)))topicsFound.add(i);}));
    if(topicsFound.size>=3&&!indecisionRef.current){
      indecisionRef.current=true;
      setTimeout(()=>{
        setMsgs(m=>[...m,{role:'ai',text:'Percebi que você está explorando várias opções — o que é ótimo! 😄 Mas que tal eu decidir por você? Diga apenas seu orçamento ou clique em 🎲 "Surpreenda-me" e deixo eu escolher o prato perfeito para este momento 🎯',time:new Date(),liked:false}]);
      },600);
    }
  },[msgs,open]);
  const toggleLike=i=>setMsgs(m=>m.map((msg,idx)=>idx===i?{...msg,liked:!msg.liked}:msg));
  const clearChat=()=>{
    setMsgs([{role:'ai',text:'Conversation effacée. Bonjour à nouveau! Em que posso ajudá-lo?',time:new Date(),liked:false}]);
    LS.set('sab_chef_session',{id:Date.now(),start:new Date().toISOString(),msgs:[]});
    setCleared(true);setTimeout(()=>setCleared(false),1500);
  };
  // New session on each open
  const handleOpen=()=>{
    setOpen(o=>{
      if(o){
        // closing — send summary
        const session=LS.get('sab_chef_session',null);
        if(session&&session.msgs&&session.msgs.length>0)sendWhatsAppSummary(session);
      } else {
        LS.set('sab_chef_session',{id:Date.now(),start:new Date().toISOString(),msgs:[]});
      }
      return !o;
    });
  };

  return h(Fragment,null,
    h('button',{id:'chef-btn','data-cursor':'chat',onClick:()=>setOpen(o=>!o),title:'Falar com Chef René'},
      h('span',{className:'chef-hat'},open?'✕':'👨‍🍳'),
      h('span',{className:'chef-btn-label'},open?'fechar':'chef ia'),
      !open&&h('span',{className:'chef-pulse'})
    ),
    h('div',{id:'chef-panel',className:open?'open':''},


      apiKey&&h('div',{className:'chef-head'},
        h('div',{className:'chef-head-bg'}),
        h('div',{className:'chef-head-glow'}),
        h('div',{className:'chef-head-content'},
          h('div',{className:'chef-portrait '+(loading?'thinking':'idle')},
            '👨‍🍳',
            h('span',{className:'chef-online'})
          ),
          h('div',{className:'chef-info'},
            h('div',{className:'chef-name'},'Chef René Dubois'),
            h('div',{className:'chef-role'},(()=>{
            const kidSignals=['mamãe','papai','mãe','pai','tio','tia','vovó','vovô','escola','nugget','macarrão','desenho','brincar'];
            const allText=msgs.map(m=>m.text||'').join(' ').toLowerCase();
            const isKid=kidSignals.some(s=>allText.includes(s));
            return isKid?'🧒 Modo Criança Ativado! · Chef Renezinho':'Sommelier IA · Curador Gastronômico';
          })()),
            h('div',{className:'chef-badges'},
              h('span',{className:'chef-badge-item'},'École Bocuse'),
              h('span',{className:'chef-badge-item'},'D.O.M Alumni'),
              h('span',{className:'chef-badge-item'},'Michelin ✦')
            )
          ),
          h('div',{className:'chef-head-actions'},
            h('button',{className:'chef-icon-btn',title:'Limpar conversa',onClick:clearChat},cleared?'✓':'🗑'),

            h('button',{className:'chef-icon-btn',title:'Fechar',onClick:()=>{const s=LS.get('sab_chef_session',null);if(s&&s.msgs&&s.msgs.length>0)sendWhatsAppSummary(s);setOpen(false);}},'×')
          )
        ),
        h('div',{className:'chef-divider'})
      ),


      apiKey&&h('div',{className:'chef-suggest-wrap'},
        h('div',{style:{display:'flex',gap:6,marginBottom:8}},
          ...CHIP_CATS.map((cat,i)=>h('button',{key:i,
            style:{padding:'3px 10px',
              background:showChips===i?'rgba(201,168,76,.18)':'rgba(255,255,255,.04)',
              border:'1px solid '+(showChips===i?'rgba(201,168,76,.4)':'rgba(255,255,255,.07)'),
              borderRadius:100,fontSize:9,fontFamily:'Inter,sans-serif',fontWeight:600,
              letterSpacing:'.1em',color:showChips===i?'#C9A84C':'rgba(200,180,160,.4)',
              cursor:'pointer',transition:'all .2s',textTransform:'uppercase'},
            onClick:()=>setShowChips(i)
          },cat.cat))
        ),
        h('div',{className:'chef-chips'},
          ...CHIP_CATS[showChips].chips.map((chip,i)=>
            h('button',{key:i,className:'chef-chip',onClick:()=>{if(!loading)send(chip);}},chip)
          )
        )
      ),
      apiKey&&h('div',{className:'chef-divider'}),
      apiKey&&h('div',{ref:msgsRef,className:'chef-msgs'},
        ...msgs.map(function(m,i){
          const parsed=parseChefMsg(m.text);
          const isAi=m.role==='ai';
          return h('div',{key:i,className:'chef-msg-wrap '+m.role},
            h('div',{className:'chef-msg-header'},
              isAi&&h('div',{className:'chef-msg-avatar'},'👨‍🍳'),
              h('span',{className:'chef-msg-name'},isAi?'Chef René':'Você'),
              h('span',{className:'chef-msg-time'},fmtTime(m.time))
            ),
            h('div',{className:'chef-bubble'},
              parsed.clean.split('\n').map(function(line,li,arr){
                return h('span',{key:li},line,li<arr.length-1&&h('br'));
              })
            ),
            parsed.cards.length>0&&h('div',{style:{display:'flex',flexDirection:'column',gap:8,marginTop:6}},
              ...parsed.cards.map(function(name,ci){return h(ChefDishCard,{key:ci,name});})
            ),
            isAi&&i>0&&h('div',{className:'chef-reactions'},
              h('button',{className:'chef-react-btn'+(m.rating===1?' liked':''),
                onClick:()=>{
                  setMsgs(ms=>ms.map((msg,idx)=>idx===i?{...msg,rating:1}:msg));
                  const mem=LS.get('sab_chef_memory',{});
                  if(!mem.liked)mem.liked=[];
                  const dishInMsg=msgs[i]&&msgs[i].text&&msgs[i].text.match(/DISH_CARD:\s*([^\n]+)/);
                  if(dishInMsg)mem.liked.push(dishInMsg[1].trim());
                  LS.set('sab_chef_memory',mem);
                }
              },m.rating===1?'👍 Ótima sugestão!':'👍'),
              h('button',{className:'chef-react-btn'+(m.rating===-1?' disliked':''),
                onClick:()=>{
                  setMsgs(ms=>ms.map((msg,idx)=>idx===i?{...msg,rating:-1}:msg));
                  setTimeout(()=>send('Não gostei desta sugestão. Pode indicar algo diferente?'),300);
                }
              },m.rating===-1?'👎 Entendido!':'👎'),
              h('button',{className:'chef-react-btn',onClick:()=>send('Me dê mais opções como esta')},
                '+ Mais opções'
              )
            )
          );
        }),
        loading&&h('div',{className:'chef-typing-wrap'},
          h('div',{className:'chef-typing-avatar'},'👨‍🍳'),
          h('div',{style:{display:'flex',flexDirection:'column'}},
            h('div',{className:'chef-typing-bubble'},h('span'),h('span'),h('span')),
            h('div',{className:'chef-typing-text'},'Chef René está preparando sua resposta...')
          )
        )
      ),
      apiKey&&h('div',{className:'chef-footer'},
        h('div',{className:'chef-input-row'},
          h('button',{className:'chef-voice-btn'+(listening?' listening':''),
            title:listening?'Parar':'Enviar por voz',
            onClick:()=>{
              if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){Toast.show('🎙️ Voz não suportada neste navegador');return;}
              if(listening){recognition.current&&recognition.current.stop();setListening(false);return;}
              const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
              recognition.current=new SR();
              recognition.current.lang='pt-BR';recognition.current.interimResults=false;
              recognition.current.onresult=e=>{const t=e.results[0][0].transcript;setInput(t);setListening(false);setTimeout(()=>send(t),150);};
              recognition.current.onerror=()=>setListening(false);
              recognition.current.onend=()=>setListening(false);
              recognition.current.start();setListening(true);
            }},'🎙️'),
          h('textarea',{ref:inputRef,className:'chef-input',
            placeholder:listening?'🎙️ Ouvindo...':'Pergunte ao Chef René...',
            value:input,onChange:function(e){setInput(e.target.value);},
            onKeyDown:handleKey,rows:1}),
          h('button',{className:'chef-send',disabled:loading||!input.trim(),onClick:function(){send();}},
            h('svg',{width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2.5},
              h('path',{d:'M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z'})
            )
          )
        ),
        h('div',{className:'chef-footer-hint'},'Enter para enviar · Shift+Enter nova linha')
      )
    )
  );
}

function PushPrompt(){
  const [show,setShow]=useState(false);
  const [dismissed,setDismissed]=useState(()=>LS.get('sab_push_dismissed',false));
  useEffect(()=>{
    if(dismissed)return;
    if(!('Notification' in window))return;
    if(Notification.permission==='granted'||Notification.permission==='denied')return;
    // Show after 45s on first visit
    const t=setTimeout(()=>setShow(true),45000);
    return()=>clearTimeout(t);
  },[]);
  // Schedule 19h notification if granted
  useEffect(()=>{
    if(Notification.permission!=='granted')return;
    const now=new Date();
    const target=new Date();target.setHours(19,0,0,0);
    if(now>target)target.setDate(target.getDate()+1);
    const diff=target-now;
    if(diff>0&&diff<24*60*60*1000){
      const t=setTimeout(()=>{
        const msgs=['🍽️ Boa noite! O Chef René tem uma sugestão especial para hoje.','🌟 Hora do jantar! Confira os pratos mais pedidos desta noite no Sabores.','👨‍🍳 Chef René aqui — já pensou no jantar? Tenho algo especial para você!'];
        const msg=msgs[Math.floor(Math.random()*msgs.length)];
        new Notification('Sabores 🍽️',{body:msg,icon:'https://emojicdn.elk.sh/🍽?style=apple'});
      },diff);
      return()=>clearTimeout(t);
    }
  },[]);
  if(!show||dismissed)return null;
  return h('div',{className:'push-prompt'},
    h('div',{className:'push-prompt-icon'},'🔔'),
    h('div',{className:'push-prompt-text'},
      h('div',{className:'push-prompt-title'},'Sugestões do Chef às 19h'),
      h('div',{className:'push-prompt-sub'},'Receba uma dica gastronômica exclusiva toda noite antes do jantar.'),
      h('div',{className:'push-prompt-btns'},
        h('button',{className:'push-allow',onClick:async()=>{
          setShow(false);setDismissed(true);LS.set('sab_push_dismissed',true);
          const perm=await Notification.requestPermission();
          if(perm==='granted')Toast.show('✅ Notificações ativadas! Até às 19h 👨‍🍳');
        }},'Ativar'),
        h('button',{className:'push-deny',onClick:()=>{setShow(false);setDismissed(true);LS.set('sab_push_dismissed',true);}},'Agora não')
      )
    )
  );
