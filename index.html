<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="Sabores — A mais sofisticada vitrine gastronômica do Brasil.">
<meta name="theme-color" content="#0a0805">
<title>Sabores — Gastronomia de Elite</title>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sabores">
<link rel="manifest" id="pwa-manifest">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{overflow-x:hidden;background:#0a0805;cursor:none}
@media(max-width:768px){body{cursor:auto}}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#E8520A,#C9A84C,#E8520A);background-size:100% 200%;border-radius:2px;animation:scrollThumbShimmer 2s linear infinite}
@keyframes scrollThumbShimmer{0%{background-position:0 0}100%{background-position:0 200%}}
.nfx-card::-webkit-scrollbar{display:none!important}

/* ── CURSOR ── */
#cur{width:12px;height:12px;background:#E8520A;border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s,border-radius .2s,opacity .2s}
#cur-r{width:44px;height:44px;border:1.5px solid rgba(232,82,10,.5);border-radius:50%;position:fixed;pointer-events:none;z-index:9997;transform:translate(-50%,-50%);transition:left .06s linear,top .06s linear,width .28s,height .28s,border-color .28s,background .28s}
#cur-emoji{position:fixed;pointer-events:none;z-index:9999;font-size:22px;transform:translate(-50%,-62%);opacity:0;transition:opacity .18s ease;line-height:1}
body.c-food #cur{opacity:0}
body.c-food #cur-emoji{opacity:1}
body.c-food #cur-r{width:54px;height:54px;border-color:rgba(232,82,10,.35);background:rgba(232,82,10,.06)}
body.c-drink #cur{opacity:0}
body.c-drink #cur-emoji{opacity:1}
body.c-drink #cur-r{width:54px;height:54px;border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.06)}
body.c-chat #cur{background:#C9A84C;width:10px;height:10px}
body.c-chat #cur-r{width:64px;height:64px;border-color:rgba(201,168,76,.5);border-style:dashed}
body.ch #cur{width:16px;height:16px;background:#C9A84C}
body.ch #cur-r{width:60px;height:60px;border-color:rgba(201,168,76,.45);background:rgba(201,168,76,.04)}
@media(max-width:768px){#cur,#cur-r,#cur-emoji{display:none}}

/* ── PROGRESS ── */
#prog{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,#E8520A,#C9A84C,#E8520A);background-size:200%;z-index:9999;width:0;transition:width .08s linear;animation:shimmer 2s linear infinite}
@keyframes shimmer{to{background-position:200% 0}}

/* ── LOADER ── */
#ldr{position:fixed;inset:0;z-index:99999;background:#0a0805;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .9s ease,visibility .9s}
#ldr.out{opacity:0;visibility:hidden;pointer-events:none}
.ldr-logo{font-family:'Playfair Display',serif;font-size:clamp(52px,9vw,96px);font-weight:900;color:#f0e6d3;letter-spacing:-3px;overflow:hidden;display:flex}
.ldr-logo span{display:inline-block;animation:ldrUp .9s cubic-bezier(.22,1,.36,1) forwards;opacity:0;transform:translateY(110%)}
.ldr-logo span:nth-child(1){animation-delay:.05s}
.ldr-logo span:nth-child(2){animation-delay:.12s}
.ldr-logo span:nth-child(3){animation-delay:.19s;color:#E8520A}
.ldr-logo span:nth-child(4){animation-delay:.26s;color:#E8520A}
.ldr-logo span:nth-child(5){animation-delay:.33s;color:#E8520A}
.ldr-logo span:nth-child(6){animation-delay:.40s;color:#E8520A}
.ldr-logo span:nth-child(7){animation-delay:.47s;color:#E8520A}
.ldr-bar{width:140px;height:1px;background:rgba(255,255,255,.1);margin-top:48px;overflow:hidden}
.ldr-fill{height:100%;background:linear-gradient(90deg,#E8520A,#C9A84C);animation:ldrFill 1.9s ease forwards}
.ldr-tag{font-family:Inter,sans-serif;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-top:20px}
@keyframes ldrUp{to{opacity:1;transform:translateY(0)}}
@keyframes ldrFill{to{width:100%}}

/* ── NOISE GRAIN OVERLAY ── */
/* grain removed - was causing page to shake */

/* ── KEYFRAMES ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(44px)}to{opacity:1;transform:none}}
@keyframes blink{0%,100%{border-color:currentColor}50%{border-color:transparent}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
@keyframes bannerFlow{0%{background-position:0 0}100%{background-position:300% 0}}
@keyframes orbDrift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(28px,-18px) scale(1.04)}66%{transform:translate(-18px,14px) scale(.97)}}
@keyframes fallLeaf{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes riseUp{0%{transform:translateY(0);opacity:0}15%{opacity:1}85%{opacity:.5}100%{transform:translateY(-110vh);opacity:0}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92) translateY(12px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes cardGlow{0%,100%{box-shadow:0 0 30px rgba(232,82,10,0)}50%{box-shadow:0 0 60px rgba(232,82,10,0.25)}}
@keyframes textGrad{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

/* ── UTILS ── */
.ns{scrollbar-width:none;-ms-overflow-style:none}
.ns::-webkit-scrollbar{display:none}
.glass{background:rgba(255,255,255,.042);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,.08)}

/* ── TILT CARD ── */
.tilt{transform-style:preserve-3d;transition:transform .08s linear,box-shadow .4s}
.tilt:hover{box-shadow:0 40px 80px rgba(0,0,0,.55)}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .hero-grid{grid-template-columns:1fr!important}
  .hero-floats{display:none!important}
  .stats-grid{grid-template-columns:1fr 1fr!important}
  .footer-grid{grid-template-columns:1fr 1fr!important}
  .promo-grid{padding:40px 28px!important}
}
@media(max-width:700px){
  .how-grid{grid-template-columns:1fr!important}
  /* Peak hours chart on mobile */
  #peak-chart{font-size:6px!important}
}
@media(max-width:600px){
  .stats-grid{grid-template-columns:1fr 1fr!important}
  .footer-grid{grid-template-columns:1fr!important}
  .promo-grid{grid-template-columns:1fr!important;padding:32px 20px!important;text-align:center}
  .how-grid{grid-template-columns:1fr!important}
  /* Favs section pills wrap nicely */
  .favs-row{gap:8px!important}
  /* Admin ChefLogs grid */
  .chef-logs-grid{grid-template-columns:1fr!important}
  /* Share + btt buttons spacing */
  .share-btn{bottom:148px!important;right:16px!important}
  #btt{bottom:90px!important;right:16px!important}
  /* Push prompt full width */
  .push-prompt{width:92vw!important;max-width:none!important}
  /* Returning banner full width */
  .returning-banner{width:92vw!important;max-width:none!important}
  /* Voice button always visible on mobile */
  .chef-voice-btn{opacity:1!important;color:rgba(200,180,160,.5)!important}
}
/* ── NAV MOBILE ── */
@media(max-width:600px){
  .nav-logo{font-size:22px!important}
  .nav-cta{padding:8px 12px!important;font-size:11px!important;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hero-h1{min-height:3.2em}
  .nav-status{font-size:8px!important;padding:4px 8px!important}
  .nav-theme{width:30px!important;height:30px!important;font-size:13px!important}
}
@media(max-width:420px){
  .nav-cta span.cta-label{display:none}
  .nav-status .status-text{display:none}
  .nav-cta{padding:8px 10px!important}
  /* Extra small — stack admin KPIs */
  .adm-kpi-grid{grid-template-columns:1fr 1fr!important}
  /* Chip overflow on very small screens */
  .chef-chips-row{padding:0 12px!important}
}


/* ── SEARCH ── */
.srch-wrap{position:relative;max-width:680px;margin:0 auto 0}
.srch-input{width:100%;padding:16px 52px 16px 20px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:100px;color:#f0e6d3;font-family:Inter,sans-serif;font-size:14px;outline:none;transition:all .3s;backdrop-filter:blur(12px)}
.srch-input::placeholder{color:rgba(200,180,160,.45)}
.srch-input:focus{border-color:rgba(232,82,10,.5);background:rgba(255,255,255,.09);box-shadow:0 0 0 3px rgba(232,82,10,.1)}
.srch-icon{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none}
.srch-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:100px;background:rgba(232,82,10,.12);border:1px solid rgba(232,82,10,.25);color:rgba(255,107,43,.9);font-size:11px;font-family:Inter,sans-serif;font-weight:500;cursor:pointer;transition:all .22s;letter-spacing:.04em;margin:3px}
.srch-tag:hover{background:rgba(232,82,10,.22)}
.srch-tag.active{background:#E8520A;color:#fff;border-color:#E8520A}

/* ── ADMIN PANEL ── */
#admin{position:fixed;inset:0;z-index:50000;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .4s}
#admin.open{opacity:1;visibility:visible}
/* ── ADMIN PANEL PREMIUM ── */
#admin{position:fixed;inset:0;z-index:50000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .4s}
#admin::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
#admin.open{opacity:1;visibility:visible}
.adm-shell{position:relative;z-index:1;width:100%;max-width:1100px;height:90vh;max-height:700px;display:grid;grid-template-columns:220px 1fr;border-radius:28px;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,.95),0 0 0 1px rgba(201,168,76,.25) inset,0 0 80px rgba(201,168,76,.06);animation:scaleIn .4s cubic-bezier(.22,1,.36,1)}
.adm-sidebar{background:linear-gradient(180deg,#14100a 0%,#0c0a06 100%);border-right:1px solid rgba(201,168,76,.15);display:flex;flex-direction:column;padding:0;overflow:hidden}
.adm-sidebar-head{padding:28px 24px 20px;border-bottom:1px solid rgba(201,168,76,.12);background:linear-gradient(135deg,rgba(201,168,76,.07),transparent)}
.adm-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:#f0e6d3;letter-spacing:-1px;margin-bottom:4px}
.adm-logo em{color:#C9A84C;font-style:italic}
.adm-logo-sub{font-size:9px;color:rgba(200,180,160,.35);font-family:Inter,sans-serif;letter-spacing:.18em;text-transform:uppercase}
.adm-nav{flex:1;padding:12px 0;overflow-y:auto}
.adm-nav-item{display:flex;align-items:center;gap:12px;padding:11px 22px;cursor:pointer;transition:all .22s;font-family:Inter,sans-serif;font-size:12px;font-weight:500;color:rgba(200,180,160,.5);letter-spacing:.02em;border-left:2px solid transparent;user-select:none}
.adm-nav-item:hover{color:rgba(200,180,160,.9);background:rgba(201,168,76,.06)}
.adm-nav-item.on{color:#C9A84C;background:linear-gradient(90deg,rgba(201,168,76,.12),rgba(201,168,76,.04));border-left-color:#C9A84C;font-weight:700}
.adm-nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.adm-nav-badge{margin-left:auto;background:rgba(232,82,10,.2);color:#E8520A;font-size:9px;font-weight:700;padding:2px 7px;border-radius:100px;letter-spacing:.05em}
.adm-sidebar-foot{padding:16px 22px;border-top:1px solid rgba(255,255,255,.05)}
.adm-status-dot{width:7px;height:7px;background:#2ecc71;border-radius:50%;display:inline-block;animation:pulse 2s infinite;margin-right:8px}
.adm-status-txt{font-size:10px;color:rgba(200,180,160,.4);font-family:Inter,sans-serif}
.adm-main{background:linear-gradient(160deg,#111009 0%,#0d0b07 100%);display:flex;flex-direction:column;overflow:hidden}
.adm-topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-bottom:1px solid rgba(201,168,76,.12);flex-shrink:0;background:linear-gradient(90deg,rgba(201,168,76,.04),transparent 60%)}
.adm-page-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#f0e6d3;letter-spacing:-.5px}
.adm-page-sub{font-size:11px;color:rgba(200,180,160,.4);font-family:Inter,sans-serif;margin-top:2px}
.adm-close{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);font-size:18px;transition:all .2s;font-family:Inter,sans-serif}
.adm-close:hover{background:rgba(231,76,60,.15);border-color:rgba(231,76,60,.3);color:#e74c3c}
.adm-content{flex:1;overflow-y:auto;padding:28px 32px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.06) transparent}
.adm-content::-webkit-scrollbar{width:4px}
.adm-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.adm-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px}
.adm-kpi{background:linear-gradient(145deg,rgba(255,255,255,.05),rgba(201,168,76,.02));border:1px solid rgba(201,168,76,.12);border-radius:18px;padding:20px 22px;position:relative;overflow:hidden;transition:all .3s;cursor:default}
.adm-kpi:hover{border-color:rgba(201,168,76,.45);transform:translateY(-3px);box-shadow:0 12px 40px rgba(201,168,76,.1)}
.adm-kpi::before{content:'';position:absolute;top:-20px;right:-20px;width:60px;height:60px;border-radius:50%;opacity:.08}
.adm-kpi-val{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;line-height:1;margin-bottom:6px;letter-spacing:-1.5px}
.adm-kpi-lbl{font-size:10px;color:rgba(200,180,160,.45);font-family:Inter,sans-serif;text-transform:uppercase;letter-spacing:.12em}
.adm-kpi-trend{font-size:9px;font-family:Inter,sans-serif;font-weight:600;margin-top:8px;display:flex;align-items:center;gap:4px}
.adm-section-title{font-size:11px;font-weight:700;font-family:Inter,sans-serif;color:rgba(201,168,76,.6);text-transform:uppercase;letter-spacing:.18em;margin-bottom:14px;margin-top:4px;padding-bottom:8px;border-bottom:1px solid rgba(201,168,76,.08)}
.adm-table{width:100%;border-collapse:collapse}
.adm-table th{font-size:9px;font-family:Inter,sans-serif;text-transform:uppercase;letter-spacing:.12em;color:rgba(200,180,160,.35);font-weight:600;padding:0 0 10px;text-align:left;border-bottom:1px solid rgba(255,255,255,.05)}
.adm-table th:last-child{text-align:right}
.adm-table td{padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04);font-family:Inter,sans-serif;font-size:12px;color:rgba(200,180,160,.8);vertical-align:middle}
.adm-table tr:last-child td{border-bottom:none}
.adm-pill{display:inline-block;padding:3px 10px;border-radius:100px;font-size:9px;font-weight:700;letter-spacing:.06em;font-family:Inter,sans-serif}
.adm-pill.green{background:rgba(46,204,113,.15);color:#2ecc71}
.adm-pill.orange{background:rgba(232,82,10,.15);color:#E8520A}
.adm-pill.red{background:rgba(231,76,60,.15);color:#e74c3c}
.adm-pill.gold{background:rgba(201,168,76,.15);color:#C9A84C}
.adm-bar-wrap{background:rgba(255,255,255,.06);border-radius:100px;height:5px;overflow:hidden}
.adm-bar{height:100%;border-radius:100px;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.adm-card{background:linear-gradient(145deg,rgba(255,255,255,.04),rgba(0,0,0,.1));border:1px solid rgba(201,168,76,.1);border-radius:16px;padding:20px 22px;margin-bottom:14px}
.adm-card-title{font-size:13px;font-weight:600;font-family:Inter,sans-serif;color:#f0e6d3;margin-bottom:12px}
.adm-input{width:100%;padding:10px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#f0e6d3;font-family:Inter,sans-serif;font-size:13px;outline:none;margin-bottom:10px;transition:border .2s}
.adm-input:focus{border-color:rgba(232,82,10,.4);background:rgba(255,255,255,.08)}
.adm-input::placeholder{color:rgba(200,180,160,.3)}
.adm-btn{padding:10px 22px;background:linear-gradient(135deg,#E8520A,#bf4008);color:#fff;border:none;border-radius:10px;font-family:Inter,sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:all .25s}
.adm-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,82,10,.4)}
.adm-btn-ghost{padding:9px 20px;background:transparent;color:rgba(200,180,160,.6);border:1px solid rgba(255,255,255,.08);border-radius:10px;font-family:Inter,sans-serif;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.04em;transition:all .22s}
.adm-btn-ghost:hover{border-color:rgba(232,82,10,.3);color:#E8520A}
.adm-divider{height:1px;background:rgba(255,255,255,.05);margin:20px 0}
.adm-ab-variant{border:2px solid rgba(255,255,255,.06);border-radius:14px;padding:16px 18px;margin-bottom:10px;transition:border-color .2s;cursor:pointer}
.adm-ab-variant.winning{border-color:rgba(46,204,113,.35);background:rgba(46,204,113,.04)}
.adm-ab-variant.current{border-color:rgba(232,82,10,.35);background:rgba(232,82,10,.04)}
.adm-heatmap-canvas{position:relative;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden;aspect-ratio:16/9;margin-bottom:16px}
.adm-heatmap-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(200,180,160,.2);font-family:Inter,sans-serif;letter-spacing:.1em;text-transform:uppercase;pointer-events:none}
@media(max-width:700px){.adm-shell{grid-template-columns:1fr;height:95vh;max-height:none}.adm-sidebar{display:none}}

/* ── TOAST NOTIFICATIONS ── */
#toast-wrap{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:40000;display:flex;flex-direction:column;gap:10px;align-items:center;pointer-events:none}
.toast{background:rgba(20,16,9,.95);border:1px solid rgba(232,82,10,.35);backdrop-filter:blur(16px);color:#f0e6d3;padding:13px 22px;border-radius:100px;font-family:Inter,sans-serif;font-size:13px;font-weight:500;white-space:nowrap;animation:toastIn .4s cubic-bezier(.22,1,.36,1) forwards;box-shadow:0 8px 32px rgba(0,0,0,.5);pointer-events:auto}
.toast.out{animation:toastOut .35s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateY(20px) scale(.9)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateY(-10px) scale(.95)}}

/* ── HEATMAP ── */
.hm-dot{position:fixed;border-radius:50%;pointer-events:none;z-index:30000;animation:hmFade 2s ease forwards}
@keyframes hmFade{0%{opacity:.8;transform:scale(1)}100%{opacity:0;transform:scale(3)}}



/* ── AB BADGE ── */
/* .ab-badge removed */

/* ── GEO BADGE ── */
.geo-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(46,204,113,.08);border:1px solid rgba(46,204,113,.2);color:#2ecc71;font-family:Inter,sans-serif;font-size:10px;padding:5px 13px;border-radius:100px;font-weight:500;letter-spacing:.05em;animation:fadeUp .6s .2s both}

/* ── TRENDING BADGE ── */
.trend-ring{position:absolute;top:-4px;right:-4px;width:18px;height:18px;background:linear-gradient(135deg,#E8520A,#C9A84C);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;z-index:3;animation:pulse 2s infinite;border:2px solid #141009}

/* ── RATING ALERT ── */
.rating-alert{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);border-radius:12px;padding:12px 16px;font-family:Inter,sans-serif;font-size:12px;color:#ff6b6b;margin-bottom:10px;display:flex;align-items:center;gap:10px}


/* ── NETFLIX ROWS ── */
.nfx-section{padding:0 0 56px;position:relative;z-index:3}
.nfx-row{margin-bottom:48px}
.nfx-row-header{display:flex;align-items:baseline;justify-content:space-between;padding:0 28px;margin-bottom:16px}
.nfx-row-title{font-family:'Playfair Display',serif;font-size:clamp(18px,2.5vw,26px);font-weight:700;color:var(--cream,#f0e6d3);letter-spacing:-.5px}
.nfx-row-title em{color:#E8520A;font-style:italic}
.nfx-row-seeall{font-family:Inter,sans-serif;font-size:11px;font-weight:600;color:rgba(232,82,10,.8);text-decoration:none;letter-spacing:.08em;text-transform:uppercase;transition:color .2s;white-space:nowrap}
.nfx-row-seeall:hover{color:#E8520A}
.nfx-track{display:flex;gap:16px;overflow-x:auto;padding:8px 28px 16px;scrollbar-width:none;-ms-overflow-style:none;scroll-snap-type:x mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;scroll-padding-left:28px}
.nfx-track::-webkit-scrollbar{display:none}
.nfx-card{flex:0 0 260px;border-radius:20px;overflow:hidden;text-decoration:none;display:block;scroll-snap-align:start;scroll-snap-stop:always;transition:transform .35s cubic-bezier(.22,1,.36,1),box-shadow .35s;position:relative;transform-origin:left center}
.nfx-card:hover{transform:scale(1.04) translateY(-4px);z-index:10}
.nfx-card:first-child{margin-left:0}
.nfx-img{height:160px;display:flex;align-items:center;justify-content:center;font-size:60px;position:relative;overflow:hidden}
.nfx-img-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,.7) 100%)}
.nfx-body{padding:14px 16px 16px}
.nfx-from{font-size:9px;color:rgba(200,180,160,.55);text-transform:uppercase;letter-spacing:.12em;font-family:Inter,sans-serif;font-weight:500;margin-bottom:4px}
.nfx-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;line-height:1.2;margin-bottom:6px;letter-spacing:-.3px}
.nfx-meta{display:flex;justify-content:space-between;align-items:center}
.nfx-price{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;letter-spacing:-1px}
.nfx-price sup{font-family:Inter,sans-serif;font-size:10px;font-weight:400;vertical-align:super}
.nfx-badge{font-size:9px;padding:3px 9px;border-radius:100px;font-family:Inter,sans-serif;font-weight:700;letter-spacing:.05em}
.nfx-arrow{position:absolute;top:0;bottom:0;width:44px;display:flex;align-items:center;justify-content:center;background:rgba(10,8,5,.6);backdrop-filter:blur(8px);border:none;cursor:pointer;font-size:18px;color:rgba(255,255,255,.8);z-index:20;transition:all .25s;opacity:0}
.nfx-row-wrap:hover .nfx-arrow{opacity:1}
.nfx-arrow-l{left:0;border-radius:0 12px 12px 0}
.nfx-arrow-r{right:0;border-radius:12px 0 0 12px}
.nfx-arrow:hover{background:rgba(232,82,10,.8);color:#fff}


/* ── CHEF IA CHAT ── */
/* ════════════════════════════════════════════════
   CHEF RENÉ — PROFESSIONAL CHAT
════════════════════════════════════════════════ */
#chef-btn{position:fixed;bottom:100px;left:24px;z-index:700;width:60px;height:60px;background:linear-gradient(145deg,#1a1408,#2a1f08);border:1.5px solid rgba(201,168,76,.4);border-radius:18px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 0 1px rgba(201,168,76,.1) inset;transition:all .4s cubic-bezier(.22,1,.36,1)}
#chef-btn:hover{transform:translateY(-4px) scale(1.06);box-shadow:0 16px 48px rgba(0,0,0,.7),0 0 24px rgba(201,168,76,.25);border-color:rgba(201,168,76,.7)}
#chef-btn .chef-hat{font-size:22px;line-height:1;transition:transform .4s cubic-bezier(.22,1,.36,1)}
#chef-btn:hover .chef-hat{transform:rotate(-8deg) translateY(-2px)}
#chef-btn .chef-btn-label{font-size:7px;font-family:Inter,sans-serif;font-weight:700;letter-spacing:.12em;color:rgba(201,168,76,.7);text-transform:uppercase}
#chef-btn .chef-pulse{position:absolute;top:8px;right:8px;width:8px;height:8px;background:#2ecc71;border-radius:50%;border:1.5px solid #0a0805;animation:pulse 2s infinite}
#chef-panel{position:fixed;bottom:0;left:0;width:420px;max-width:100vw;height:640px;max-height:92vh;z-index:800;display:flex;flex-direction:column;background:#090805;border:1px solid rgba(201,168,76,.2);border-radius:24px 24px 0 0;box-shadow:0 -16px 80px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.03) inset;transform:translateY(calc(100% + 20px));transition:transform .6s cubic-bezier(.22,1,.36,1);overflow:hidden}
#chef-panel.open{transform:translateY(0)}

/* Header */
.chef-head{position:relative;padding:0;flex-shrink:0;overflow:hidden}
.chef-head-bg{position:absolute;inset:0;background:linear-gradient(135deg,#1a1005 0%,#0f0c05 60%,#120d08 100%);z-index:0}
.chef-head-glow{position:absolute;top:-40px;left:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(201,168,76,.18) 0%,transparent 70%);z-index:0;pointer-events:none}
.chef-head-content{position:relative;z-index:1;display:flex;align-items:center;gap:14px;padding:18px 20px 14px}
.chef-portrait{width:52px;height:52px;border-radius:16px;background:linear-gradient(145deg,#2a1f08,#1a1308);border:1.5px solid rgba(201,168,76,.35);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;position:relative;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:transform .3s}
.chef-portrait.thinking{animation:chefThink 1.2s ease-in-out infinite}
@keyframes chefThink{0%,100%{transform:rotate(-4deg) scale(1.05)}50%{transform:rotate(4deg) scale(1.08)}}
.chef-portrait.idle{animation:chefIdle 3s ease-in-out infinite}
@keyframes chefIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.chef-portrait::after{content:'';position:absolute;inset:0;border-radius:16px;background:linear-gradient(135deg,rgba(201,168,76,.12),transparent);pointer-events:none}
.chef-online{position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;background:#2ecc71;border-radius:50%;border:2px solid #090805;animation:pulse 2s infinite}
.chef-info{flex:1;min-width:0}
.chef-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#f0e6d3;letter-spacing:-.4px;line-height:1.1;margin-bottom:3px}
.chef-role{font-size:10px;color:rgba(201,168,76,.65);font-family:Inter,sans-serif;letter-spacing:.1em;text-transform:uppercase;font-weight:500}
.chef-badges{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.chef-badge-item{font-size:8.5px;font-family:Inter,sans-serif;font-weight:600;letter-spacing:.05em;color:rgba(200,180,160,.5);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);padding:2px 7px;border-radius:100px}
.chef-head-actions{display:flex;gap:6px;flex-shrink:0}
.chef-icon-btn{width:34px;height:34px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:rgba(255,255,255,.45);transition:all .22s}
.chef-icon-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.chef-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.15) 30%,rgba(201,168,76,.15) 70%,transparent);flex-shrink:0}

/* Suggestions */
.chef-suggest-wrap{padding:12px 16px 10px;flex-shrink:0}
.chef-suggest-label{font-size:9px;font-family:Inter,sans-serif;font-weight:600;letter-spacing:.14em;color:rgba(200,180,160,.3);text-transform:uppercase;margin-bottom:8px}
.chef-chips{display:flex;gap:6px;flex-wrap:wrap}
.chef-chip{padding:6px 13px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.18);border-radius:100px;font-size:10.5px;color:rgba(201,168,76,.75);font-family:Inter,sans-serif;cursor:pointer;transition:all .22s;white-space:nowrap;font-weight:500;letter-spacing:.02em}
.chef-chip:hover{background:rgba(201,168,76,.15);color:#C9A84C;border-color:rgba(201,168,76,.4);transform:translateY(-1px)}

/* Messages */
.chef-msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;scrollbar-color:rgba(201,168,76,.15) transparent}
.chef-msgs::-webkit-scrollbar{width:3px}
.chef-msgs::-webkit-scrollbar-thumb{background:rgba(201,168,76,.15);border-radius:2px}
.chef-msg-wrap{display:flex;flex-direction:column;animation:fadeUp .35s cubic-bezier(.22,1,.36,1)}
.chef-msg-wrap.ai{align-items:flex-start}
.chef-msg-wrap.user{align-items:flex-end}
.chef-msg-header{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.chef-msg-wrap.user .chef-msg-header{flex-direction:row-reverse}
.chef-msg-avatar{width:24px;height:24px;border-radius:8px;background:linear-gradient(135deg,#C9A84C,#8a5e00);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.chef-msg-name{font-size:10px;font-family:Inter,sans-serif;font-weight:600;color:rgba(200,180,160,.4);letter-spacing:.04em}
.chef-msg-time{font-size:9px;font-family:Inter,sans-serif;color:rgba(200,180,160,.25);margin-left:auto}
.chef-msg-wrap.user .chef-msg-time{margin-left:0;margin-right:auto}
.chef-bubble{padding:12px 16px;border-radius:18px;font-family:Inter,sans-serif;font-size:13px;line-height:1.68;font-weight:300;max-width:86%;word-break:break-word;position:relative}
.chef-msg-wrap.ai .chef-bubble{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.15);color:#f0e6d3;border-radius:4px 18px 18px 18px}
.chef-msg-wrap.user .chef-bubble{background:linear-gradient(135deg,#E8520A 0%,#bf4008 100%);color:#fff;border-radius:18px 4px 18px 18px;border:none}

/* Dish card inline */
.chef-dish-card{margin-top:10px;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.2);border-radius:14px;overflow:hidden;text-decoration:none;display:block;transition:all .28s;max-width:260px}
.chef-dish-card:hover{border-color:rgba(201,168,76,.45);background:rgba(255,255,255,.08);transform:translateY(-2px)}
.chef-dish-card-img{height:80px;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(232,82,10,.08))}
.chef-dish-card-body{padding:10px 12px}
.chef-dish-card-name{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#f0e6d3;margin-bottom:3px;line-height:1.2}
.chef-dish-card-meta{font-size:10px;color:rgba(200,180,160,.5);font-family:Inter,sans-serif;display:flex;justify-content:space-between;align-items:center}
.chef-dish-card-price{color:#C9A84C;font-weight:700;font-family:'Playfair Display',serif;font-size:14px}

/* Typing */
.chef-typing-wrap{display:flex;align-items:center;gap:10px;padding:8px 0}
.chef-typing-avatar{width:24px;height:24px;border-radius:8px;background:linear-gradient(135deg,#C9A84C,#8a5e00);display:flex;align-items:center;justify-content:center;font-size:12px}
.chef-typing-bubble{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.15);border-radius:4px 18px 18px 18px;padding:12px 16px;display:flex;gap:5px;align-items:center}
.chef-typing-bubble span{width:6px;height:6px;background:rgba(201,168,76,.5);border-radius:50%;display:inline-block;animation:typingDot 1.4s ease-in-out infinite}
.chef-typing-bubble span:nth-child(2){animation-delay:.2s}
.chef-typing-bubble span:nth-child(3){animation-delay:.4s}
@keyframes typingDot{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-5px);opacity:1}}
.chef-typing-text{font-size:10px;color:rgba(200,180,160,.3);font-family:Inter,sans-serif;font-style:italic;margin-top:4px;padding-left:32px}

/* Footer */
.chef-footer{padding:12px 14px 18px;border-top:1px solid rgba(255,255,255,.05);flex-shrink:0;background:rgba(0,0,0,.3)}
.chef-input-row{display:flex;gap:8px;align-items:flex-end}
.chef-input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.2);border-radius:16px;padding:11px 15px;color:#f0e6d3;font-family:Inter,sans-serif;font-size:13px;outline:none;resize:none;max-height:100px;transition:border .25s,background .25s;line-height:1.55}
.chef-input:focus{border-color:rgba(201,168,76,.5);background:rgba(255,255,255,.07)}
.chef-input::placeholder{color:rgba(200,180,160,.3);font-style:italic}
.chef-send{width:44px;height:44px;background:linear-gradient(135deg,#C9A84C,#8a5e00);border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all .28s;align-self:flex-end;color:#fff;box-shadow:0 4px 16px rgba(201,168,76,.3)}
.chef-send:hover:not(:disabled){transform:scale(1.08) translateY(-2px);box-shadow:0 8px 28px rgba(201,168,76,.5)}
.chef-send:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.chef-footer-hint{font-size:9.5px;color:rgba(200,180,160,.22);font-family:Inter,sans-serif;text-align:center;margin-top:8px;letter-spacing:.04em}

/* Reactions */
.chef-reactions{display:flex;gap:5px;margin-top:5px;opacity:0;transition:opacity .2s}
.chef-msg-wrap:hover .chef-reactions{opacity:1}
.chef-react-btn.disliked{background:rgba(231,76,60,.12);border-color:rgba(231,76,60,.4);color:#e74c3c}
.chef-react-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:100px;padding:2px 7px;font-size:10px;cursor:pointer;color:rgba(200,180,160,.5);transition:all .18s;font-family:Inter,sans-serif}
.chef-react-btn:hover{background:rgba(201,168,76,.15);border-color:rgba(201,168,76,.3);color:#C9A84C}
.chef-react-btn.liked{background:rgba(201,168,76,.15);border-color:rgba(201,168,76,.4);color:#C9A84C}

@media(max-width:480px){#chef-panel{width:100vw;border-radius:24px 24px 0 0}#chef-btn{bottom:88px;left:16px}#chef-panel.open{height:100dvh;max-height:100dvh;border-radius:0}}


/* ── SABOR DO MOMENTO ── */
.momento-section{position:relative;overflow:hidden;transition:background 1.2s ease}
.momento-clock{font-family:'Playfair Display',serif;font-size:clamp(72px,14vw,160px);font-weight:900;line-height:.85;letter-spacing:-6px;opacity:.06;position:absolute;right:-20px;top:50%;transform:translateY(-50%);pointer-events:none;user-select:none}
.momento-live{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:100px;font-family:Inter,sans-serif;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;margin-bottom:28px}
.momento-live::before{content:'';width:6px;height:6px;border-radius:50%;display:inline-block;animation:pulse 1.5s infinite}
.momento-period{font-family:'Playfair Display',serif;font-size:clamp(36px,6vw,72px);font-weight:900;line-height:.95;letter-spacing:-2.5px;margin-bottom:16px}
.momento-sub{font-family:Inter,sans-serif;font-size:14px;font-weight:300;line-height:1.75;max-width:420px;margin-bottom:36px;opacity:.75}
.momento-card{border-radius:28px;overflow:hidden;text-decoration:none;display:flex;align-items:center;gap:24px;padding:28px 32px;border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(16px);transition:transform .4s cubic-bezier(.22,1,.36,1),box-shadow .4s;position:relative;max-width:480px}
.momento-card:hover{transform:translateY(-6px) scale(1.02)}
.momento-card-emoji{font-size:72px;line-height:1;flex-shrink:0;filter:drop-shadow(0 12px 24px rgba(0,0,0,.5));transition:transform .5s cubic-bezier(.22,1,.36,1)}
.momento-card:hover .momento-card-emoji{transform:translateY(-8px) rotate(6deg) scale(1.1)}
.momento-tag{font-size:9px;font-family:Inter,sans-serif;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.7;margin-bottom:6px}
.momento-dish{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;line-height:1.15;letter-spacing:-.5px;margin-bottom:4px}
.momento-rest{font-size:11px;font-family:Inter,sans-serif;font-weight:400;opacity:.6;margin-bottom:16px}
.momento-cta{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:100px;font-family:Inter,sans-serif;font-size:12px;font-weight:700;letter-spacing:.05em;text-decoration:none;transition:all .28s;border:none;cursor:pointer}
.momento-time-wrap{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.momento-time-display{font-family:'Playfair Display',serif;font-size:48px;font-weight:900;letter-spacing:-2px;line-height:1}
.momento-time-colon{animation:blink .9s step-end infinite;opacity:.7}
@media(max-width:600px){.momento-card{flex-direction:column;text-align:center;padding:24px}.momento-clock{display:none}}


/* ── API KEY GATE ── */
.chef-apikey-screen{position:absolute;inset:0;background:#090805;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;animation:fadeUp .4s cubic-bezier(.22,1,.36,1)}
.chef-apikey-icon{font-size:48px;margin-bottom:16px;filter:drop-shadow(0 8px 24px rgba(201,168,76,.4))}
.chef-apikey-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#f0e6d3;margin-bottom:8px;letter-spacing:-.4px}
.chef-apikey-sub{font-size:12px;color:rgba(200,180,160,.45);font-family:Inter,sans-serif;line-height:1.7;margin-bottom:24px;max-width:280px}
.chef-apikey-input{width:100%;padding:13px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.3);border-radius:14px;color:#f0e6d3;font-family:'Courier New',monospace;font-size:12px;outline:none;margin-bottom:12px;transition:border .2s;letter-spacing:.04em;text-align:center}
.chef-apikey-input:focus{border-color:rgba(201,168,76,.7);background:rgba(255,255,255,.08)}
.chef-apikey-input::placeholder{color:rgba(200,180,160,.25);font-family:Inter,sans-serif;letter-spacing:0;font-size:11px}
.chef-apikey-btn{width:100%;padding:13px;background:linear-gradient(135deg,#C9A84C,#8a5e00);color:#fff;border:none;border-radius:12px;font-family:Inter,sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:all .28s;margin-bottom:10px}
.chef-apikey-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,168,76,.45)}
.chef-apikey-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.chef-apikey-hint{font-size:10px;color:rgba(200,180,160,.3);font-family:Inter,sans-serif;line-height:1.6}
.chef-apikey-hint a{color:rgba(201,168,76,.6);text-decoration:none}
.chef-apikey-hint a:hover{color:#C9A84C}
.chef-apikey-err{font-size:11px;color:#e74c3c;font-family:Inter,sans-serif;margin-bottom:10px;background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.2);border-radius:8px;padding:8px 12px}


/* ── PIN LOCK ── */
.chef-pin-screen{position:absolute;inset:0;background:#090805;z-index:11;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;animation:fadeUp .35s cubic-bezier(.22,1,.36,1)}
.chef-pin-icon{font-size:44px;margin-bottom:14px}
.chef-pin-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#f0e6d3;margin-bottom:6px}
.chef-pin-sub{font-size:11px;color:rgba(200,180,160,.4);font-family:Inter,sans-serif;margin-bottom:24px;line-height:1.6}
.chef-pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:24px}
.chef-pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(201,168,76,.4);transition:all .2s}
.chef-pin-dot.filled{background:#C9A84C;border-color:#C9A84C;box-shadow:0 0 12px rgba(201,168,76,.5)}
.chef-pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:220px;margin-bottom:16px}
.chef-pin-key{height:56px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#f0e6d3;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center}
.chef-pin-key:hover{background:rgba(201,168,76,.15);border-color:rgba(201,168,76,.35);color:#C9A84C;transform:scale(1.04)}
.chef-pin-key:active{transform:scale(.96)}
.chef-pin-key.del{font-size:16px;color:rgba(200,180,160,.5)}
.chef-pin-key.ok{background:linear-gradient(135deg,#C9A84C,#8a5e00);border-color:#C9A84C;color:#fff;font-size:16px}
.chef-pin-key.ok:hover{box-shadow:0 4px 20px rgba(201,168,76,.45)}
.chef-pin-err{font-size:11px;color:#e74c3c;font-family:Inter,sans-serif;margin-bottom:10px;min-height:18px}

  let score = 0;
  // CPU cores (low-end = 2 or less)
  if(navigator.hardwareConcurrency) score += Math.min(navigator.hardwareConcurrency, 8);
  else score += 2;
  // RAM in GB (low-end = 2GB or less) — not all browsers support
  if(navigator.deviceMemory) score += Math.min(navigator.deviceMemory * 2, 8);
  else score += 4;
  // Reduced motion preference
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) score = 0;
  // Slow connection
  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  if(conn && (conn.saveData || conn.effectiveType === '2g' || conn.effectiveType === 'slow-2g')) score = 0;
  // score < 8 = low-end device
  const isLow = score < 8;
  if(isLow) document.documentElement.classList.add('low-perf');
  return { isLow, score };
})();

  // Get sorted items by click count
  sort(type,items,idKey){
    const data=LS.get('sab_clicks_'+type,{});
    return [...items].sort((a,b)=>(data[b[idKey]]||0)-(data[a[idKey]]||0));
  },
  // Get top item
  top(type,items,idKey){
    const data=LS.get('sab_clicks_'+type,{});
    let best=items[0];let max=0;
    items.forEach(i=>{const c=data[i[idKey]]||0;if(c>max){max=c;best=i;}});
    return best;
  },
  // Get all stats
  stats(){
    return{
      dishes:LS.get('sab_clicks_dish',{}),
      cats:LS.get('sab_clicks_cat',{}),
      rests:LS.get('sab_clicks_rest',{}),
      drinks:LS.get('sab_clicks_drink',{}),
      totalClicks:Object.values(LS.get('sab_clicks_dish',{})).reduce((a,b)=>a+b,0),
      session:LS.get('sab_session',{start:Date.now(),clicks:0}),
    };
  },
  // Heatmap click
  heatClick(x,y){
    const hm=LS.get('sab_heatmap',[]);
    hm.push({x:Math.round(x/window.innerWidth*100),y:Math.round(y/window.innerHeight*100),t:Date.now()});
    if(hm.length>200)hm.shift();
    LS.set('sab_heatmap',hm);

  // CTR per dish
  ctr(dishName){
    const clicks=LS.get('sab_clicks_dish',{})[dishName]||0;
    const views=LS.get('sab_views_dish',{})[dishName]||1;
    return((clicks/views)*100).toFixed(1)+'%';

  view(dishName){

const AB={
  // Get or assign variant (persisted)
  variant(test,variants){
    const key='sab_ab_'+test;
    const existing=LS.get(key);
    if(existing&&variants.includes(existing))return existing;
    const v=variants[Math.floor(Math.random()*variants.length)];
    LS.set(key,v);
    return v;
  },
  // Track conversion
  convert(test){
    const key='sab_ab_conv_'+test;
    const data=LS.get(key,{});
    const v=LS.get('sab_ab_'+test,'A');
    data[v]=(data[v]||0)+1;
    LS.set(key,data);
  },
  // Get results
  results(test){
    return{variant:LS.get('sab_ab_'+test,'A'),conversions:LS.get('sab_ab_conv_'+test,{})};
  },
};

// ── Geolocation Engine ──
const Geo={
  _cache:null,
  async detect(){
    if(this._cache)return this._cache;
    const cached=LS.get('sab_geo');
    if(cached&&Date.now()-cached.ts<86400000)return(this._cache=cached);
    return new Promise(res=>{
      if(!navigator.geolocation)return res(null);
      navigator.geolocation.getCurrentPosition(
        pos=>{
          const data={lat:pos.coords.latitude,lng:pos.coords.longitude,ts:Date.now(),
            city:pos.coords.latitude>-10&&pos.coords.latitude<5?'Norte':
                 pos.coords.latitude>-25&&pos.coords.latitude<-10?'Sudeste':
                 pos.coords.latitude<-25?'Sul':'Centro-Oeste'};
          LS.set('sab_geo',data);this._cache=data;res(data);
        },
        ()=>res(null),{timeout:5000}
      );
    });
  },
};

// ── NLP Search Engine ──
const NLP={
  // Map natural language to categories/filters
  INTENTS:{
    pizza:['pizza','napoli','italiana','margherita'],
    burger:['burger','hamburguer','smash','wagyu'],
    sushi:['japonês','japonesa','sushi','temaki','omakase'],
    churrasco:['churrasco','costela','angus','brasa','carne'],
    massa:['massa','massas','italiano','italiana','fettucine','espaguete'],
    mexicano:['mexicano','mexicana','tacos','burrito'],
    acai:['açaí','acai','amazônico','bowl'],
    saudavel:['saudável','fit','orgânico','vegano','vegetariano','natural'],
    barato:['barato','econômico','em conta','popular'],
    premium:['premium','gourmet','especial','exclusivo','chef'],
    rapido:['rápido','rápida','urgente','agora','fome','imediato'],
    promocao:['promoção','promoções','desconto','oferta'],
  },
  parse(query){
    const q=query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const result={cats:[],filter:null,tags:[]};
    Object.entries(this.INTENTS).forEach(([intent,words])=>{
      if(words.some(w=>q.includes(w))){
        if(['barato','premium','rapido','promocao'].includes(intent)){
          if(intent==='premium')result.filter='Premium';
          if(intent==='promocao')result.filter='Promoções';
          result.tags.push(intent);
        } else {
          result.cats.push(intent);
        }
      }
    });
    return result;
  },
  // Filter dishes by parsed intent
  filterDishes(dishes,query){
    if(!query||!query.trim())return dishes;
    const {cats,filter,tags}=this.parse(query);
    if(!cats.length&&!filter&&!tags.length)return dishes;
    return dishes.filter(d=>{
      const text=(d.name+d.desc+d.from+d.e).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      const allWords=Object.values(this.INTENTS).flat();
      if(filter&&d.tag!==filter&&!cats.length)return false;
      return cats.some(c=>this.INTENTS[c]?.some(w=>text.includes(w)))||
             (cats.length===0&&filter&&d.tag===filter)||
             (cats.length===0&&tags.length&&tags.some(t=>this.INTENTS[t]?.some(w=>text.includes(w))));
    });
  },
};

// ── Daily Top Dish ──
function getDailyTop(dishes){
  const day=new Date().toDateString();
  const key='sab_daily_'+day;
  const cached=LS.get(key);
  if(cached)return dishes.find(d=>d.name===cached)||dishes[0];
  // Mix analytics + day-based seed for consistent daily pick
  const sorted=Analytics.sort('dish',dishes,'name');
  // If we have real data, use that, otherwise rotate by day
  const dayIdx=new Date().getDate()%dishes.length;
  const pick=sorted[0]?.name?(Analytics.stats().totalClicks>0?sorted[0]:dishes[dayIdx]):dishes[dayIdx];
  LS.set(key,pick.name);
  return pick;
}

function getCardDecos(idx){
  if(PERF.isLow)return null;
  var theme=getSeasonalTheme();
  if(!theme)return null;
  var sets={
    'Carnaval':     ['\uD83C\uDFAD','\u2728','\uD83C\uDF88','\uD83C\uDF89'],
    'P\u00e1scoa':  ['\uD83D\uDC23','\uD83E\uDD5A','\uD83C\uDF38','\uD83D\uDC30'],
    'Dia dos Namorados':['\u2764','\uD83C\uDF39','\uD83D\uDC8C','\uD83E\uDD77'],
    'Festa Junina': ['\uD83C\uDF3D','\u2B50','\uD83D\uDD6E','\uD83C\uDFB6'],
    '7 de Setembro':['\u2B50','\uD83D\uDCAB','\uD83C\uDF4E','\uD83C\uDF1F'],
    'Halloween':    ['\uD83E\uDD87','\uD83D\uDC7B','\uD83D\uDC80','\uD83C\uDF83','\uD83D\uDD77'],
    'Finados':      ['\uD83D\uDD6F','\uD83C\uDF38','\uD83D\uDC9C','\uD83E\uDDB8'],
    'Natal':        ['\u2744','\u2B50','\uD83D\uDD14','\uD83C\uDF81'],
    'R\u00e9veillon':['\uD83C\uDF86','\u2728','\uD83E\uDD42','\uD83C\uDF1F'],
  };
  var decos=sets[theme.name];
  if(!decos)return null;
  var l=decos[idx%decos.length];
  var r=decos[(idx+2)%decos.length];
  if((idx*7+3)%10>5)return [{p:'l',e:l}];
  return [{p:'l',e:l},{p:'r',e:r}];
}

function SeasonalOverlay(){
  var theme=getSeasonalTheme();

}

/* ════ DISH MANAGER ════ */
function DishManager(){
  var [dishes,setDishes]=useState(function(){return JSON.parse(JSON.stringify(DISHES));});
  var [editing,setEditing]=useState(null);
  var [form,setForm]=useState({});

  function openEdit(i){
    setEditing(i);
    var base=i==='new'?{e:'',name:'',from:'',desc:'',price:'',time:'30',frete:'Gratis',stars:'4.8',reviews:'100',tag:'Novidades',badge:'Novo',bg:'linear-gradient(145deg,#1c0d04,#301a08)',q:''}:Object.assign({},dishes[i]);
    setForm(base);
  }

  function saveEdit(){
    if(!form.name||!form.price){Toast.show('Nome e preco sao obrigatorios');return;}
    var updated=editing==='new'?dishes.concat([form]):dishes.map(function(d,i){return i===editing?Object.assign({},form):d;});
    setDishes(updated);
    DISHES.splice(0,DISHES.length,...updated);
    LS.set('sab_dishes_override',updated);
    setEditing(null);
    Toast.show('Prato salvo! Recarregue a pagina para ver no site.');
  }

  function deleteDish(i){
    if(!confirm('Remover este prato?'))return;
    var updated=dishes.filter(function(_,idx){return idx!==i;});
    setDishes(updated);
    DISHES.splice(0,DISHES.length,...updated);
    LS.set('sab_dishes_override',updated);
    Toast.show('Prato removido');
  }

  function resetDishes(){
    if(!confirm('Restaurar pratos originais?'))return;
    LS.set('sab_dishes_override',null);
    Toast.show('Recarregue a pagina para restaurar');
  }

  function Field(p){
    function onChange(e){
      var val=e.target.value;
      setForm(function(f){var n=Object.assign({},f);n[p.k]=val;return n;});
    }
    return h('div',{style:{marginBottom:10}},
      h('label',{style:{display:'block',fontFamily:'Inter,sans-serif',fontSize:10,fontWeight:600,color:'rgba(200,180,160,.5)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:4}},p.label),
      p.multi
        ?h('textarea',{value:form[p.k]||'',rows:3,onChange:onChange,style:{width:'100%',background:'rgba(255,255,255,.05)',border:'1px solid rgba(201,168,76,.2)',borderRadius:10,padding:'9px 12px',color:'#f0e6d3',fontFamily:'Inter,sans-serif',fontSize:12,outline:'none',resize:'vertical',boxSizing:'border-box'}})
        :h('input',{type:'text',value:form[p.k]||'',placeholder:p.ph||'',onChange:onChange,style:{width:'100%',background:'rgba(255,255,255,.05)',border:'1px solid rgba(201,168,76,.2)',borderRadius:10,padding:'9px 12px',color:'#f0e6d3',fontFamily:'Inter,sans-serif',fontSize:12,outline:'none',boxSizing:'border-box'}})
    );
  }

  if(editing!==null) return h('div',null,
    h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:18}},
      h('button',{onClick:function(){setEditing(null);},style:{background:'none',border:'1px solid rgba(255,255,255,.1)',borderRadius:8,color:'rgba(200,180,160,.6)',cursor:'pointer',padding:'6px 14px',fontFamily:'Inter,sans-serif',fontSize:11}},'<- Voltar'),
      h('div',{className:'adm-section-title',style:{margin:0}},editing==='new'?'Novo prato':'Editar prato')
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
      h(Field,{label:'Emoji',k:'e',ph:'Emoji'}),
      h(Field,{label:'Nome',k:'name',ph:'Nome do prato'}),
      h(Field,{label:'Restaurante',k:'from',ph:'Nome do restaurante'}),
      h(Field,{label:'Preco R$',k:'price',ph:'54'}),
      h(Field,{label:'Entrega min',k:'time',ph:'25'}),
      h(Field,{label:'Frete',k:'frete',ph:'Gratis ou R$5'}),
      h(Field,{label:'Avaliacao',k:'stars',ph:'4.9'}),
      h(Field,{label:'Qtd avaliacoes',k:'reviews',ph:'1200'}),
      h(Field,{label:'Badge',k:'badge',ph:'Mais pedido'}),
      h(Field,{label:'Tag',k:'tag',ph:'Novidades'})
    ),
    h(Field,{label:'Descricao',k:'desc',multi:true}),
    h('div',{style:{display:'flex',gap:10,marginTop:4}},
      h('button',{className:'adm-btn',style:{flex:1,padding:'11px'},onClick:saveEdit},'Salvar prato'),
      h('button',{className:'adm-btn-ghost',style:{padding:'11px 18px'},onClick:function(){setEditing(null);}},'Cancelar')
    )
  );

  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      h('div',{className:'adm-section-title',style:{margin:0}},dishes.length+' pratos'),
      h('div',{style:{display:'flex',gap:8}},
        h('button',{className:'adm-btn-ghost',style:{padding:'6px 12px',fontSize:10},onClick:resetDishes},'Restaurar'),
        h('button',{className:'adm-btn',style:{padding:'6px 14px',fontSize:11},onClick:function(){openEdit('new');}},'+ Novo prato')
      )
    ),
    h('div',{style:{display:'flex',flexDirection:'column',gap:8,maxHeight:460,overflowY:'auto',scrollbarWidth:'thin'}},
      dishes.map(function(d,i){
        return h('div',{key:i,style:{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:12}},
          h('div',{style:{fontSize:26,flexShrink:0}},d.e),
          h('div',{style:{flex:1,minWidth:0}},
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:700,color:'#f0e6d3',marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},d.name),
            h('div',{style:{fontFamily:'Inter,sans-serif',fontSize:10,color:'rgba(200,180,160,.4)'}},d.from+' - R$'+d.price+' - '+d.stars+'*')
          ),
          h('div',{style:{display:'flex',gap:6,flexShrink:0}},
            h('button',{className:'adm-btn-ghost',style:{padding:'5px 10px',fontSize:10},onClick:function(){openEdit(i);}},'\u270F\uFE0F Editar'),
            h('button',{className:'adm-btn',style:{padding:'5px 10px',fontSize:10,background:'linear-gradient(135deg,#e74c3c,#c0392b)'},onClick:function(){deleteDish(i);}},'X')
          )
        );
      })
    )
  );
}

function ChefLogs(){
  const [logs,setLogs]=useState(()=>LS.get('sab_chef_logs',[]));
  const [selected,setSelected]=useState(null);

  const fmtDate=iso=>{
    if(!iso)return'?';
    const d=new Date(iso);
    return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  };

  const clearLogs=()=>{
    LS.set('sab_chef_logs',[]);
    setLogs([]);setSelected(null);
    Toast.show('🗑 Logs limpos');
  };

  const exportLogs=()=>{
    const txt=logs.map(s=>[
      '═══ Sessão '+new Date(s.start).toLocaleString('pt-BR')+' ═══',
      ...s.msgs.map(m=>'['+new Date(m.t).toLocaleTimeString('pt-BR')+'] Cliente: '+m.q+'\n  Chef: '+m.a)
    ].join('\n')).join('\n\n');
    const blob=new Blob([txt],{type:'text/plain'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='chef-logs.txt';a.click();
    Toast.show('📥 Logs exportados!');
  };

  if(logs.length===0) return h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:200,gap:12}},
    h('div',{style:{fontSize:36,opacity:.3}},'💬'),
    h('div',{style:{fontFamily:'Inter,sans-serif',fontSize:12,color:'rgba(200,180,160,.3)',textAlign:'center'}},'Nenhuma conversa registrada ainda.\nQuando clientes usarem o Chef René, aparecerá aqui.')
  );

  return h('div',{className:'chef-logs-grid',style:{display:'grid',gridTemplateColumns:selected?'1fr 1.5fr':'1fr',gap:16,height:'100%'}},
    // Sessions list
    h('div',null,
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
        h('div',{className:'adm-section-title',style:{margin:0}},logs.length+' sessão'+(logs.length!==1?'ões':'')),
        h('div',{style:{display:'flex',gap:6}},
          h('button',{className:'adm-btn-ghost',style:{padding:'5px 12px',fontSize:10},onClick:exportLogs},'📥 Exportar'),
          h('button',{className:'adm-btn',style:{padding:'5px 12px',fontSize:10,background:'linear-gradient(135deg,#e74c3c,#c0392b)'},onClick:clearLogs},'🗑 Limpar')
        )
      ),
      h('div',{style:{display:'flex',flexDirection:'column',gap:6,maxHeight:460,overflowY:'auto',scrollbarWidth:'thin'}},
        ...logs.map((s,i)=>h('div',{key:i,
          onClick:()=>setSelected(selected===i?null:i),
          style:{
            padding:'12px 14px',
            background:selected===i?'rgba(201,168,76,.1)':'rgba(255,255,255,.03)',
            border:'1px solid '+(selected===i?'rgba(201,168,76,.35)':'rgba(255,255,255,.06)'),
            borderRadius:12,cursor:'pointer',transition:'all .2s'
          }},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}},
            h('div',{style:{fontFamily:'Inter,sans-serif',fontSize:11,color:'#C9A84C',fontWeight:600}},'Sessão #'+(logs.length-i)),
            h('span',{className:'adm-pill gold'},s.msgs.length+' msg'+(s.msgs.length!==1?'s':''))
          ),
          h('div',{style:{fontFamily:'Inter,sans-serif',fontSize:10,color:'rgba(200,180,160,.4)',marginBottom:4}},fmtDate(s.start)),
          s.msgs.length>0&&h('div',{style:{fontFamily:'Inter,sans-serif',fontSize:11,color:'rgba(200,180,160,.55)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},
            '💬 "'+s.msgs[0].q.slice(0,40)+(s.msgs[0].q.length>40?'...':'')+'"'
          )
        ))
      )
    ),
      // Selected session detail
      selected!==null&&logs[selected]&&h('div',{style:{borderLeft:'1px solid rgba(255,255,255,.05)',paddingLeft:16}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
        h('div',{className:'adm-section-title',style:{margin:0}},'Conversa completa'),
        h('button',{className:'adm-icon-btn',style:{background:'none',border:'none',color:'rgba(200,180,160,.4)',cursor:'pointer',fontSize:18},onClick:()=>setSelected(null)},'×')
      ),
      h('div',{style:{display:'flex',flexDirection:'column',gap:10,maxHeight:440,overflowY:'auto',scrollbarWidth:'thin'}},
        ...logs[selected].msgs.map((m,i)=>h('div',{key:i,style:{display:'flex',flexDirection:'column',gap:6}},
          h('div',{style:{alignSelf:'flex-end',background:'linear-gradient(135deg,#E8520A,#bf4008)',color:'#fff',padding:'8px 12px',borderRadius:'14px 4px 14px 14px',fontFamily:'Inter,sans-serif',fontSize:11,maxWidth:'80%',lineHeight:1.55}},
            m.q
          ),
          h('div',{style:{alignSelf:'flex-start',background:'rgba(201,168,76,.08)',border:'1px solid rgba(201,168,76,.15)',color:'#f0e6d3',padding:'8px 12px',borderRadius:'4px 14px 14px 14px',fontFamily:'Inter,sans-serif',fontSize:11,maxWidth:'85%',lineHeight:1.55}},

}

/* ════════════════════════════════════════════════════════════
   SIDE EFFECTS (cursor, progress, tilt)
════════════════════════════════════════════════════════════ */
function bootCursor(){
  const dot=document.getElementById('cur'),ring=document.getElementById('cur-r'),em=document.getElementById('cur-emoji');
  if(!dot||!ring||window.innerWidth<=768)return;
  let mx=0,my=0,rx=0,ry=0,raf;
  const EMOJIS={food:'🍴',drink:'🥂',chat:'💬'};
  const move=e=>{
    mx=e.clientX;my=e.clientY;
    dot.style.left=mx+'px';dot.style.top=my+'px';
    if(em){em.style.left=mx+'px';em.style.top=my+'px';}
  };
  document.addEventListener('mousemove',move,{passive:true});
  const loop=()=>{rx+=(mx-rx)*.14;ry+=(my-ry)*.14;ring.style.left=rx+'px';ring.style.top=ry+'px';raf=requestAnimationFrame(loop);};
  loop();
  // Smart cursor type detection
  const setCursor=type=>{
    document.body.classList.remove('c-food','c-drink','c-chat','ch');
    if(type){document.body.classList.add('c-'+type);if(em)em.textContent=EMOJIS[type]||'';}
    else if(em)em.textContent='';
  };
  // Attach to all interactive elements
  document.addEventListener('mouseover',e=>{
    const el=e.target.closest('[data-cursor]');
    if(el){setCursor(el.dataset.cursor);return;}
    const link=e.target.closest('a,button,[data-h]');
    if(link){document.body.classList.add('ch');}
    else{document.body.classList.remove('ch');}
  });
  document.addEventListener('mouseout',e=>{
    if(!e.relatedTarget||e.relatedTarget===document.body){setCursor(null);document.body.classList.remove('ch');}
  });
  return()=>{document.removeEventListener('mousemove',move);cancelAnimationFrame(raf);};
}

function bootProgress(){
  const bar=document.getElementById('prog');
  if(!bar)return;
  const fn=()=>{
    const pct=(window.scrollY/(document.documentElement.scrollHeight-window.innerHeight))*100;
    bar.style.width=Math.min(pct,100)+'%';
  };
  window.addEventListener('scroll',fn,{passive:true});
  return()=>window.removeEventListener('scroll',fn);
}

function applyTilt(el,e){
  if(PERF.isLow)return;
  const r=el.getBoundingClientRect();
  // Normalized -0.5 to 0.5 position within card
  const nx=(e.clientX-r.left)/r.width-.5;
  const ny=(e.clientY-r.top)/r.height-.5;
  // Magnetic pull: card tilts TOWARD cursor (positive = toward)
  const rotX=ny*-18;   // tilt up when cursor at bottom
  const rotY=nx*18;    // tilt right when cursor at right
  // Translate slightly toward cursor for 3D depth illusion
  const tx=nx*8;
  const ty=ny*8;
  el.style.transform=`perspective(800px) rotateX(${rotX}deg) rotateY(${rotY}deg) translate(${tx}px,${ty}px) scale(1.03)`;
  // Dynamic highlight based on cursor position
  const light=`radial-gradient(circle at ${(nx+.5)*100}% ${(ny+.5)*100}%, rgba(255,255,255,.08) 0%, transparent 65%)`;
  let shine=el.querySelector('.mag-shine');
  if(!shine){shine=document.createElement('div');shine.className='mag-shine';shine.style.cssText='position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:10;transition:background .1s';el.style.position='relative';el.appendChild(shine);}
  shine.style.background=light;
}
function resetTilt(el){
  el.style.transform='perspective(800px) rotateX(0) rotateY(0) translate(0,0) scale(1)';
  const shine=el.querySelector('.mag-shine');
  if(shine)shine.style.background='none';
}

/* ── Typing effect ── */
function TypeWriter({color}){
  const [txt,setTxt]=useState('');
  useEffect(()=>{
    const words=['uma obra de arte.','uma história perfeita.','emoção pura.','vício em forma de prato.'];
    let wi=0,ci=0,del=false;
    const tick=()=>{
      const w=words[wi];
      if(!del){ci++;setTxt(w.slice(0,ci));if(ci===w.length){del=true;setTimeout(tick,2500);return;}}
      else{ci--;setTxt(w.slice(0,ci));if(ci===0){del=false;wi=(wi+1)%words.length;setTimeout(tick,500);return;}}
      setTimeout(tick,del?45:75);
    };
    const t=setTimeout(tick,900);
    return()=>clearTimeout(t);
  },[]);
  return h('span',{style:{borderRight:`2px solid ${color}`,paddingRight:4,animation:'blink .8s step-end infinite',fontStyle:'italic',color}},txt);
}

/* ── Animated Counter ── */
function Counter({target,suffix}){
  const [v,setV]=useState(0);
  const ref=useRef(null);
  const done=useRef(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{
      if(e.isIntersecting&&!done.current){
        done.current=true;obs.unobserve(el);
        const t0=performance.now();
        const dur=1800;
        const step=t=>{
          const p=Math.min((t-t0)/dur,1);
          setV(Math.round((1-Math.pow(1-p,4))*target));
          if(p<1)requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }
    },{threshold:.5});
    obs.observe(el);return()=>obs.disconnect();
  },[target]);
  return h('span',{ref},v.toLocaleString('pt-BR')+suffix);
}

/* ── Reveal ── */
function Rv({children,delay=0,dir='up',style={},cls=''}){
  const ref=useRef(null);const[v,setV]=useState(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setV(true);o.unobserve(el);}},{threshold:.06});
    o.observe(el);return()=>o.disconnect();
  },[]);
  const from={up:'translateY(44px)',left:'translateX(-44px)',right:'translateX(44px)',zoom:'scale(.93)'}[dir]||'translateY(44px)';
  return h('div',{ref,className:cls,style:{opacity:v?1:0,transform:v?'none':from,transition:`opacity .85s ${delay}s cubic-bezier(.22,1,.36,1),transform .85s ${delay}s cubic-bezier(.22,1,.36,1)`,...style}},children);
}

function getMomento(){
  const h=new Date().getHours();
  if(h>=5&&h<11)return MOMENTOS.manha;
  if(h>=11&&h<15)return MOMENTOS.almoco;
  if(h>=15&&h<19)return MOMENTOS.happyhour;
  if(h>=19&&h<23)return MOMENTOS.jantar;
  return MOMENTOS.madrugada;
}

function LiveClock(){
  const [time,setTime]=useState(()=>new Date());
  useEffect(()=>{const id=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(id);},[]);
  const hh=String(time.getHours()).padStart(2,'0');
  const mm=String(time.getMinutes()).padStart(2,'0');
  const ss=String(time.getSeconds()).padStart(2,'0');
  return h('div',{className:'momento-time-wrap'},
    h('span',{className:'momento-time-display'},hh),

}

function detectLanguage(text){
  if(!text)return 'pt';
  const t=text.toLowerCase();
  const langs=[
    {code:'en',words:['i want','i need','i am','what is','can you','please','recommend','hello','hi ','good morning','good evening','what are','how much','the best','suggest','for me','tonight','hungry','give me','i like','do you have','something','looking for']},
    {code:'es',words:['quiero','necesito','hola','buenos','buenas','puedes','recomienda','para mi','esta noche','hambre','tienes','que me','algo','busco','quisiera','dame','me gustaria','tengo ganas']},
    {code:'fr',words:['je veux','je voudrais','bonjour','bonsoir','pouvez','recommandez','pour moi','ce soir','faim','avez-vous','quelque chose','je cherche','donnez moi','sil vous plait']},
    {code:'it',words:['voglio','vorrei','buongiorno','buonasera','puoi','raccomanda','per me','stasera','fame','avete','qualcosa','cerco','mi dai','per favore','cosa consigli']},
    {code:'de',words:['ich möchte','ich will','guten morgen','guten abend','können sie','empfehlen','für mich','heute abend','hunger','haben sie','etwas','ich suche','bitte','was empfehlen']},
    {code:'zh',words:['我想要','我需要','你好','晚上好','可以','推荐','为我','今晚','饥饿','你们有','什么','我在找']},
    {code:'ja',words:['ください','おすすめ','こんにちは','こんばんは','何が','食べたい','腹が減った','ありますか']},
    {code:'ar',words:['أريد','أحتاج','مرحبا','مساء الخير','أوصي','لي','الليلة','جائع','عندكم','شيء']},
    {code:'ru',words:['я хочу','мне нужно','привет','добрый вечер','можете','порекомендуйте','для меня','сегодня вечером','голодный','есть ли у вас']},
    {code:'hi',words:['मुझे चाहिए','नमस्ते','सुझाव','मेरे लिए','भूख','क्या आपके पास']},
    {code:'ko',words:['원해요','필요해요','안녕하세요','추천','저를 위해','오늘 밤','배고파요','있나요']},
  ];
  for(const lang of langs){
    if(lang.words.some(w=>t.includes(w)))return lang.code;
  }
  return 'pt';
}
function getChefSystem(msgHistory,currentMsg){
  // Kid mode — current message + full history
  const kidSignals=['mamãe','papai','mãe','pai','tio','tia','vovó','vovô','escola','lanche','desenho','brincar','cartoon','nugget','macarrão','batata frita','suco de caixinha','sou criança','sou pequenininho','sou pequenininha','anos de idade','tenho 4','tenho 5','tenho 6','tenho 7','tenho 8','tenho 9','tenho 10','tenho 11','tenho 12','criança','infantil','meu filho','minha filha','para criança','estou pedindo para uma criança','sou uma criança'];
  const allText=((msgHistory||[]).map(m=>m.text||'').join(' ')+(currentMsg||'')).toLowerCase();
  const isKid=kidSignals.some(s=>allText.includes(s));
  // Language detection — current message only (user may switch mid-chat)
  const lang=detectLanguage(currentMsg||'');
  const langNames={en:'English',es:'Spanish/español',fr:'French/français',it:'Italian/italiano',de:'German/Deutsch',zh:'Chinese/中文',ja:'Japanese/日本語',ar:'Arabic/العربية',ru:'Russian/русский',hi:'Hindi/हिन्दी',ko:'Korean/한국어'};
  // Detect bad mood in current message
  const moodWords=['cansado','cansada','estressado','estressada','dia horrível','péssimo dia','dia ruim','difícil','exausto','exausta','frustrado','frustrada','triste','ansioso','ansiosa'];
  const hasBadMood=currentMsg&&moodWords.some(w=>currentMsg.toLowerCase().includes(w));
  const moodBlock=hasBadMood?'\n\nMODO COMFORT FOOD ATIVADO 🤗: O cliente teve um dia difícil. Tom extra carinhoso, empático e acolhedor. Sugira pratos reconfortantes, quentinhos, cremosos. Diga algo como "Dias assim pedem uma comida que abraça de dentro pra fora..." Priorize: macarrão cremoso, caldos, hambúrgueres suculentos, chocolates quentes.':'';
  const langBlock=lang!=='pt'?'\n\n*** LANGUAGE OVERRIDE — MANDATORY ***: The client is writing in '+( langNames[lang]||lang)+'. You MUST respond ENTIRELY in that language ('+lang+'). Not a single word in Portuguese. Maintain your French chef personality and charm but write EXCLUSIVELY in the client language. If the language uses a non-Latin script (Chinese, Japanese, Arabic, etc), write in that script.':'';
  return buildChefSystem(isKid)+langBlock+moodBlock;
}
